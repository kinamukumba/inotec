<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar na sua conta</title>
    <link rel="shortcut icon" href="./assets/img/logo/faicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style-login.css">
    <link rel="stylesheet" href="./assets/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.7/css/all.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.0/dist/sweetalert2.min.css" rel="stylesheet">
</head>
<body>
    <div class="load">
        <div class="loader">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
            <div class="circle circle-4"></div>
        </div>
    </div>
    <div class="container-login">
        <form action="" class="form-set-login your-count">
            <img class="logo" src="./assets/img/logo/logo.png" alt="">
            <div class="text-contain">
                <h1 class="title-login">Faça login na sua conta</h1>
                <p class="text-normal login">Não tem uma conta? <i>Cadastrar-se</i></p>
            </div>
            <div class="main-inputs">
                <div class="input">
                    <input name="email-login" type="email" placeholder="Digite o email">
                </div>
                <div class="input">
                    <input name="pass-login" type="password" placeholder="Palavra-passe">
                    <i class="fa fa-eye-slash" aria-hidden="true"></i>
                </div>
                <div class="check">
                    <input type="checkbox" placeholder="#">
                    <i>Mantenha-me conectado</i>
                </div>
                <button disabled class="button-login">
                    <i class="fa fa-lock" aria-hidden="true"></i>
                    Entrar
                </button>
            </div>
            <p class="option-red">Redifinir Palavra-passe</p>
        </form>
    </div>
    <script src="./assets/js/alert.js"></script>
    <script src="./assets/js/index-forms.js"></script>
    <script src="./assets/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.14.4/dist/sweetalert2.all.min.js"></script>
</body>
</html>
